name: panopticon
description: "Panopticon — local-first behavioral self-observation system."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Permissions and platform
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  intl: ^0.20.1
  share_plus: ^10.1.2
  file_picker: ^8.1.6
  crypto: ^3.0.6
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/instruments/
